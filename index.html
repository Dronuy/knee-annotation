<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knee MRI — Insall-Salvati Annotation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f8f8f6;color:#1a1a1a;overflow-x:hidden}
::selection{background:#1D9E75;color:#fff}
input[type=range]{-webkit-appearance:none;height:4px;background:#ddd;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:#1D9E75;border-radius:50%;cursor:pointer}
kbd{font-family:'JetBrains Mono',monospace;background:#eee;border:1px solid #ddd;padding:1px 5px;border-radius:3px;font-size:10px}
button{font-family:'DM Sans',sans-serif}
.mono{font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const SUPABASE_URL = "https://mxbtvxbgeyuzffmutauy.supabase.co";
const SUPABASE_KEY = "sb_publishable_4xGHRNKKKIKrA16wRw0JWg_IIw-YUSV";
const STORAGE_URL = `${SUPABASE_URL}/storage/v1/object/public/images`;

const COORD_SIZE = 450;
const DISPLAY_SIZE = 800;
const SCALE = DISPLAY_SIZE / COORD_SIZE;

const LM_DEFS = [
  { key: "pt", label: "Patella top", color: "#E24B4A", short: "PT" },
  { key: "pb", label: "Patella bottom", color: "#378ADD", short: "PB" },
  { key: "tt", label: "Tibial tuberosity", color: "#EF9F27", short: "TT" },
];

function getCategory(is) {
  if (is === null) return null;
  if (is < 0.74) return { label: "Patella baja", bg: "#FCEBEB", text: "#A32D2D" };
  if (is < 0.8) return { label: "Borderline baja", bg: "#FAEEDA", text: "#854F0B" };
  if (is <= 1.2) return { label: "Normal", bg: "#E1F5EE", text: "#0F6E56" };
  if (is <= 1.3) return { label: "Borderline alta", bg: "#FAEEDA", text: "#854F0B" };
  return { label: "Patella alta", bg: "#FCEBEB", text: "#A32D2D" };
}

function calcIS(lm) {
  if (!lm.pt || !lm.pb || !lm.tt) return null;
  const pLen = Math.hypot(lm.pt.x - lm.pb.x, lm.pt.y - lm.pb.y);
  const tLen = Math.hypot(lm.pb.x - lm.tt.x, lm.pb.y - lm.tt.y);
  return pLen < 3 ? null : tLen / pLen;
}

function getPlacingMode(lm) {
  if (!lm.pt) return "pt";
  if (!lm.pb) return "pb";
  if (!lm.tt) return "tt";
  return "done";
}

async function supabaseFetch(path, opts = {}) {
  const headers = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, ...opts.headers };
  try { const r = await fetch(`${SUPABASE_URL}${path}`, { ...opts, headers }); return r.ok ? r : null; }
  catch { return null; }
}

async function loadProgress(name) {
  const r = await supabaseFetch(`/rest/v1/annotations?radiologist=eq.${encodeURIComponent(name)}&select=study_id,slice_index,landmarks,is_index,category,created_at&order=created_at.desc`);
  if (!r) return { saved: {}, lastStudyId: null };
  const rows = await r.json();
  const saved = {};
  let lastStudyId = rows.length > 0 ? rows[0].study_id : null;
  rows.forEach(row => { saved[row.study_id] = { slice: row.slice_index, landmarks: row.landmarks, is_index: row.is_index, category: row.category }; });
  return { saved, lastStudyId };
}

async function saveToSupabase(entry) {
  await supabaseFetch("/rest/v1/annotations", {
    method: "POST",
    headers: { "Content-Type": "application/json", Prefer: "resolution=merge-duplicates" },
    body: JSON.stringify(entry),
  });
}

function usePreloader(studyId, totalSlices) {
  const [images, setImages] = useState({});
  const [loaded, setLoaded] = useState(0);
  const cacheRef = useRef({});

  useEffect(() => {
    if (!studyId) return;
    if (cacheRef.current.studyId === studyId) {
      setImages(cacheRef.current.images);
      setLoaded(totalSlices);
      return;
    }
    setImages({});
    setLoaded(0);
    let cancelled = false;
    const imgs = {};
    let count = 0;
    for (let i = 0; i < totalSlices; i++) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src = `${STORAGE_URL}/${studyId}/slice_${String(i+1).padStart(3,"0")}.png`;
      img.onload = () => {
        if (cancelled) return;
        imgs[i] = img;
        count++;
        if (count % 5 === 0 || count === totalSlices) { setImages({...imgs}); setLoaded(count); }
      };
      img.onerror = () => { if (cancelled) return; count++; if (count % 5 === 0 || count === totalSlices) setLoaded(count); };
    }
    return () => { cancelled = true; };
  }, [studyId, totalSlices]);

  useEffect(() => {
    if (loaded === totalSlices && studyId) cacheRef.current = { studyId, images };
  }, [loaded, totalSlices, studyId, images]);

  return { images, loaded };
}

function Login({ onStart }) {
  const [name, setName] = useState("");
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"80vh"}}>
      <div style={{textAlign:"center",maxWidth:400}}>
        <div style={{fontSize:13,color:"#1D9E75",fontWeight:500,letterSpacing:1,textTransform:"uppercase",marginBottom:8}} className="mono">Research tool</div>
        <h1 style={{fontSize:24,fontWeight:500,marginBottom:6}}>Knee MRI annotation</h1>
        <p style={{fontSize:14,color:"#888",marginBottom:32,lineHeight:1.6}}>
          Select the optimal sagittal slice and mark 3 anatomical landmarks to calculate the Insall-Salvati index.
        </p>
        <input value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&name.trim()&&onStart(name.trim())}
          placeholder="Your name"
          style={{width:260,padding:"10px 14px",border:"1px solid #ddd",borderRadius:8,fontSize:15,fontFamily:"'DM Sans',sans-serif",background:"#fff",marginBottom:12,outline:"none"}}/>
        <div>
          <button onClick={()=>name.trim()&&onStart(name.trim())}
            style={{padding:"10px 36px",background:"#1D9E75",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:500,cursor:"pointer"}}>
            Start annotation
          </button>
        </div>
        <div style={{marginTop:32,fontSize:12,color:"#aaa",lineHeight:1.8}}>
          <kbd>scroll</kbd> slices &nbsp; <kbd>click</kbd> place point &nbsp; <kbd>Z</kbd> undo &nbsp; <kbd>Enter</kbd> save<br/>
          <kbd>MMB+drag</kbd> brightness/contrast &nbsp; <kbd>Ctrl+scroll</kbd> zoom &nbsp; <kbd>RMB+drag</kbd> pan &nbsp; <kbd>R</kbd> reset
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("login");
  const [name, setName] = useState("");
  const [manifest, setManifest] = useState(null);
  const [studyIdx, setStudyIdx] = useState(0);
  const [sliceIdx, setSliceIdx] = useState(0);
  const [lm, setLm] = useState({pt:null,pb:null,tt:null});
  const [saved, setSaved] = useState({});
  const [zoom, setZoom] = useState(1);
  const [pan, setPan] = useState({x:0,y:0});
  const [brightness, setBrightness] = useState(100);
  const [contrast, setContrast] = useState(100);
  const [saving, setSaving] = useState(false);

  const overlayRef = useRef(null);
  const dragRef = useRef({type:null});

  const study = manifest?.studies?.[studyIdx];
  const totalSlices = study?.slices || 1;
  const is = calcIS(lm);
  const cat = getCategory(is);
  const mode = getPlacingMode(lm);

  // Count completed vs skipped
  const completedCount = Object.values(saved).filter(v => v.category !== "skipped").length;
  const skippedCount = Object.values(saved).filter(v => v.category === "skipped").length;
  const totalDone = completedCount + skippedCount;

  const { images: preloaded, loaded: preloadCount } = usePreloader(study?.id, totalSlices);
  const currentImg = preloaded[sliceIdx];

  useEffect(() => {
    fetch(`${STORAGE_URL}/manifest.json`).then(r=>r.json()).then(d=>{ if(d?.studies?.length) setManifest(d); }).catch(()=>{});
  }, []);

  useEffect(() => {
    const canvas = overlayRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, DISPLAY_SIZE, DISPLAY_SIZE);
    [["pt","pb"],["pb","tt"]].forEach(([a,b]) => {
      if (lm[a] && lm[b]) {
        ctx.beginPath();
        ctx.moveTo(lm[a].x*SCALE*zoom+pan.x*SCALE, lm[a].y*SCALE*zoom+pan.y*SCALE);
        ctx.lineTo(lm[b].x*SCALE*zoom+pan.x*SCALE, lm[b].y*SCALE*zoom+pan.y*SCALE);
        ctx.strokeStyle="rgba(255,255,255,0.4)"; ctx.lineWidth=2; ctx.setLineDash([6,6]); ctx.stroke(); ctx.setLineDash([]);
      }
    });
    LM_DEFS.forEach(({key,color,short})=>{
      if(!lm[key])return;
      const sx=lm[key].x*SCALE*zoom+pan.x*SCALE, sy=lm[key].y*SCALE*zoom+pan.y*SCALE;
      ctx.beginPath(); ctx.arc(sx,sy,8,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
      ctx.strokeStyle="#fff"; ctx.lineWidth=2.5; ctx.stroke();
      ctx.fillStyle="#fff"; ctx.font="bold 13px 'JetBrains Mono',monospace"; ctx.fillText(short,sx+12,sy+5);
    });
  }, [lm, zoom, pan]);

  const goStudy = useCallback((idx) => {
    if (!manifest) return;
    const s = manifest.studies[idx];
    setStudyIdx(idx);
    const prev = saved[s?.id];
    if (prev && prev.category !== "skipped") {
      setSliceIdx(prev.slice);
      setLm(JSON.parse(JSON.stringify(prev.landmarks)));
    } else {
      setSliceIdx(Math.floor((s?.slices||30)/2));
      setLm({pt:null,pb:null,tt:null});
    }
    setZoom(1); setPan({x:0,y:0}); setBrightness(100); setContrast(100);
  }, [manifest, saved]);

  const sliceIdxRef = useRef(sliceIdx);
  sliceIdxRef.current = sliceIdx;
  const totalSlicesRef = useRef(totalSlices);
  totalSlicesRef.current = totalSlices;

  const changeSlice = useCallback((idx) => {
    const c = Math.max(0, Math.min(totalSlicesRef.current-1, idx));
    if (c !== sliceIdxRef.current) { setSliceIdx(c); setLm({pt:null,pb:null,tt:null}); }
  }, []);

  const undo = useCallback(() => {
    setLm(l => {
      if (l.tt) return {...l, tt:null};
      if (l.pb) return {...l, pb:null};
      if (l.pt) return {...l, pt:null};
      return l;
    });
  }, []);

  const doSave = useCallback(async () => {
    if (!study) return;
    if (mode !== "done") {
      // Skip — save as skipped
      const skipEntry = { radiologist:name, study_id:study.id, slice_index:-1, landmarks:null, is_index:null, category:"skipped" };
      setSaved(p=>({...p,[study.id]:{slice:-1,landmarks:null,is_index:null,category:"skipped"}}));
      setSaving(true); await saveToSupabase(skipEntry); setSaving(false);
      if (studyIdx < manifest.studies.length-1) goStudy(studyIdx+1);
      return;
    }
    const entry = { radiologist:name, study_id:study.id, slice_index:sliceIdx, landmarks:lm,
      is_index: is!==null ? Math.round(is*1000)/1000 : null, category: cat?.label||null };
    setSaved(p=>({...p,[study.id]:{slice:sliceIdx,landmarks:JSON.parse(JSON.stringify(lm)),is_index:entry.is_index,category:entry.category}}));
    setSaving(true); await saveToSupabase(entry); setSaving(false);
    if (studyIdx < manifest.studies.length-1) goStudy(studyIdx+1);
  }, [study,mode,name,sliceIdx,lm,is,cat,studyIdx,manifest,goStudy]);

  const handleMouseDown = useCallback((e) => {
    e.preventDefault();
    const rect = overlayRef.current.getBoundingClientRect();
    const displayScale = DISPLAY_SIZE/rect.width;
    if (e.button===1) { dragRef.current={type:"wl",sx:e.clientX,sy:e.clientY,sb:brightness,sc:contrast}; }
    else if (e.button===2||(e.button===0&&e.ctrlKey)) { dragRef.current={type:"pan",sx:e.clientX,sy:e.clientY,sp:{...pan},displayScale}; }
    else if (e.button===0&&mode!=="done") {
      const displayX=(e.clientX-rect.left)*displayScale;
      const displayY=(e.clientY-rect.top)*displayScale;
      const coordX=(displayX/SCALE-pan.x)/zoom;
      const coordY=(displayY/SCALE-pan.y)/zoom;
      setLm(l=>({...l,[mode]:{x:coordX,y:coordY}}));
    }
  }, [mode,pan,zoom,brightness,contrast]);

  const handleMouseMove = useCallback((e) => {
    const d=dragRef.current; if(!d.type)return;
    if(d.type==="wl"){ setContrast(Math.max(20,Math.min(400,d.sc+(e.clientX-d.sx)))); setBrightness(Math.max(20,Math.min(400,d.sb-(e.clientY-d.sy)))); }
    else if(d.type==="pan"){ setPan({x:d.sp.x+(e.clientX-d.sx)*d.displayScale/SCALE, y:d.sp.y+(e.clientY-d.sy)*d.displayScale/SCALE}); }
  }, []);
  const handleMouseUp = useCallback(()=>{ dragRef.current={type:null}; },[]);

  useEffect(() => {
    if(screen!=="app")return;
    const onKey=(e)=>{
      if(e.key==="a"||e.key==="A"||e.key==="ArrowLeft"){e.preventDefault();changeSlice(sliceIdxRef.current-1);}
      if(e.key==="d"||e.key==="D"||e.key==="ArrowRight"){e.preventDefault();changeSlice(sliceIdxRef.current+1);}
      if(e.key==="z"||e.key==="Z")undo();
      if(e.key==="Enter")doSave();
      if(e.key==="r"||e.key==="R"){setBrightness(100);setContrast(100);setZoom(1);setPan({x:0,y:0});}
    };
    const onWheel=(e)=>{
      if(e.ctrlKey||e.metaKey){e.preventDefault();setZoom(z=>Math.max(0.5,Math.min(5,z+(e.deltaY<0?0.15:-0.15))));}
      else{e.preventDefault();changeSlice(sliceIdxRef.current+(e.deltaY>0?1:-1));}
    };
    window.addEventListener("keydown",onKey);
    window.addEventListener("wheel",onWheel,{passive:false});
    return()=>{window.removeEventListener("keydown",onKey);window.removeEventListener("wheel",onWheel);};
  }, [screen,changeSlice,undo,doSave]);

  const handleStart = async(n)=>{
    setName(n);
    const { saved: progress, lastStudyId } = await loadProgress(n);
    setSaved(progress);
    setScreen("app");
    if(manifest){
      let startIdx = 0;
      if (lastStudyId) {
        const lastIdx = manifest.studies.findIndex(s => s.id === lastStudyId);
        if (lastIdx >= 0) {
          let nextIdx = lastIdx + 1;
          while (nextIdx < manifest.studies.length && progress[manifest.studies[nextIdx].id]) {
            nextIdx++;
          }
          startIdx = Math.min(nextIdx, manifest.studies.length - 1);
        }
      } else {
        startIdx = manifest.studies.findIndex(s => !progress[s.id]);
        if (startIdx < 0) startIdx = 0;
      }
      const s = manifest.studies[startIdx];
      setStudyIdx(startIdx);
      const prev = progress[s?.id];
      if(prev && prev.category !== "skipped"){setSliceIdx(prev.slice);setLm(JSON.parse(JSON.stringify(prev.landmarks)));}
      else setSliceIdx(Math.floor((s?.slices||30)/2));
    }
  };

  if(!manifest)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"80vh"}}><div className="mono" style={{fontSize:14,color:"#888"}}>Loading studies...</div></div>);
  if(screen==="login")return <Login onStart={handleStart}/>;

  const modeColors={pt:"#E24B4A",pb:"#378ADD",tt:"#EF9F27",done:"#1D9E75"};
  const modeLabels={pt:"Place: patella top",pb:"Place: patella bottom",tt:"Place: tibial tuberosity",done:"All points placed"};
  const allPlaced=mode==="done";
  const isSkipped = saved[study?.id]?.category === "skipped";

  const imgStyle = {
    position:"absolute", top:0, left:0,
    width: DISPLAY_SIZE, height: DISPLAY_SIZE,
    objectFit:"contain",
    transformOrigin:"0 0",
    transform:`translate(${pan.x*SCALE}px,${pan.y*SCALE}px) scale(${zoom})`,
    filter:`brightness(${brightness}%) contrast(${contrast}%)`,
    imageRendering:"pixelated",
    pointerEvents:"none",
  };

  return (
    <div style={{maxWidth:1200,margin:"0 auto",padding:"16px 20px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span className="mono" style={{fontSize:13,background:"#fff",border:"1px solid #e0e0e0",borderRadius:8,padding:"4px 10px"}}>{studyIdx+1}/{manifest.studies.length}</span>
          <span className="mono" style={{fontSize:11,color:"#999",maxWidth:240,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{study.id}</span>
          <span style={{fontSize:13,color:"#1D9E75"}}>{completedCount} done</span>
          {skippedCount > 0 && <span style={{fontSize:13,color:"#BA7517"}}>{skippedCount} skipped</span>}
          {saving&&<span style={{fontSize:12,color:"#1D9E75"}}>saving...</span>}
          {isSkipped&&<span style={{fontSize:12,color:"#BA7517",fontWeight:500}}>previously skipped</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:140,height:4,background:"#e8e8e8",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",background:"#1D9E75",borderRadius:2,width:`${(totalDone/manifest.studies.length)*100}%`,transition:"width 0.3s"}}/>
          </div>
          <span className="mono" style={{fontSize:12,color:"#aaa"}}>{name}</span>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) 250px",gap:20}}>
        <div>
          <div style={{position:"relative",background:"#0a0a0a",borderRadius:12,overflow:"hidden",width:DISPLAY_SIZE,height:DISPLAY_SIZE,maxWidth:"100%",aspectRatio:"1"}} onContextMenu={e=>e.preventDefault()}>
            {currentImg ? (
              <img src={currentImg.src} draggable={false} style={imgStyle}/>
            ) : (
              <div style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span className="mono" style={{color:"#555",fontSize:14}}>{preloadCount<totalSlices?`Loading ${preloadCount}/${totalSlices}...`:"No image"}</span>
              </div>
            )}
            <canvas ref={overlayRef} width={DISPLAY_SIZE} height={DISPLAY_SIZE}
              style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",cursor:mode==="done"?"default":"crosshair"}}
              onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}/>
            <div className="mono" style={{position:"absolute",top:10,left:10,fontSize:12,color:"rgba(255,255,255,0.6)",background:"rgba(0,0,0,0.5)",padding:"3px 8px",borderRadius:4,pointerEvents:"none"}}>Slice {sliceIdx+1}/{totalSlices}</div>
            <div className="mono" style={{position:"absolute",top:10,right:10,fontSize:12,padding:"4px 10px",borderRadius:4,background:modeColors[mode]+"dd",color:"#fff",pointerEvents:"none"}}>{modeLabels[mode]}</div>
            <div className="mono" style={{position:"absolute",bottom:10,right:10,fontSize:11,color:"rgba(255,255,255,0.5)",pointerEvents:"none"}}>B:{Math.round(brightness)}% C:{Math.round(contrast)}%{zoom!==1&&` ×${zoom.toFixed(1)}`}</div>
            {preloadCount<totalSlices&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:"rgba(255,255,255,0.1)"}}><div style={{height:"100%",background:"#1D9E75",width:`${(preloadCount/totalSlices)*100}%`,transition:"width 0.2s"}}/></div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,margin:"10px 0",maxWidth:DISPLAY_SIZE}}>
            <span className="mono" style={{fontSize:12,color:"#999",minWidth:22}}>{sliceIdx+1}</span>
            <input type="range" min={0} max={totalSlices-1} value={sliceIdx} step={1} onChange={e=>{setSliceIdx(parseInt(e.target.value));setLm({pt:null,pb:null,tt:null});}} style={{flex:1}}/>
            <span className="mono" style={{fontSize:12,color:"#999",minWidth:22}}>{totalSlices}</span>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:12,padding:"14px 16px"}}>
            <div style={{fontSize:11,color:"#aaa",textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Landmarks</div>
            {LM_DEFS.map((def,i)=>(
              <div key={def.key} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<2?"1px solid #f0f0f0":"none"}}>
                <div style={{width:11,height:11,borderRadius:"50%",background:def.color,flexShrink:0}}/>
                <span style={{fontSize:14,flex:1}}>{def.label}</span>
                <span className="mono" style={{fontSize:12,color:"#aaa"}}>{lm[def.key]?`${Math.round(lm[def.key].x)},${Math.round(lm[def.key].y)}`:"—"}</span>
                {lm[def.key]&&<button onClick={()=>setLm(l=>({...l,[def.key]:null}))} style={{fontSize:12,color:"#ccc",cursor:"pointer",border:"none",background:"none",padding:"2px 4px"}}>✕</button>}
              </div>
            ))}
          </div>
          <div style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:12,padding:"14px 16px",textAlign:"center"}}>
            <div style={{fontSize:11,color:"#aaa",textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Insall-Salvati index</div>
            <div className="mono" style={{fontSize:32,fontWeight:500}}>{is!==null?is.toFixed(2):"—"}</div>
            {cat&&<div style={{fontSize:14,marginTop:6,padding:"4px 12px",borderRadius:8,display:"inline-block",background:cat.bg,color:cat.text}}>{cat.label}</div>}
          </div>
          <div style={{display:"flex",gap:8,marginTop:"auto"}}>
            <button onClick={()=>studyIdx>0&&goStudy(studyIdx-1)} disabled={studyIdx===0}
              style={{flex:1,padding:10,borderRadius:8,fontSize:14,fontWeight:500,cursor:studyIdx>0?"pointer":"default",border:"1px solid #ddd",background:"#fff",color:"#333",opacity:studyIdx>0?1:0.4}}>Prev</button>
            <button onClick={doSave}
              style={{flex:2,padding:10,borderRadius:8,fontSize:14,fontWeight:500,cursor:"pointer",border:"none",background:allPlaced?"#1D9E75":"#f0f0f0",color:allPlaced?"#fff":"#999"}}>
              {allPlaced?"Save + Next ↵":"Skip →"}</button>
          </div>
          <div style={{fontSize:11,color:"#bbb",textAlign:"center",lineHeight:1.8}}>
            <kbd>scroll</kbd> slices <kbd>Z</kbd> undo <kbd>Enter</kbd> save <kbd>R</kbd> reset<br/>
            <kbd>MMB</kbd> B/C <kbd>Ctrl+scroll</kbd> zoom <kbd>RMB</kbd> pan
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
