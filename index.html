<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knee MRI — Insall-Salvati Annotation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f8f8f6;color:#1a1a1a;overflow-x:hidden}
::selection{background:#1D9E75;color:#fff}
input[type=range]{-webkit-appearance:none;height:4px;background:#ddd;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:#1D9E75;border-radius:50%;cursor:pointer}
kbd{font-family:'JetBrains Mono',monospace;background:#eee;border:1px solid #ddd;padding:1px 5px;border-radius:3px;font-size:10px}
button{font-family:'DM Sans',sans-serif}
.mono{font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const SUPABASE_URL = "https://mxbtvxbgeyuzffmutauy.supabase.co";
const SUPABASE_KEY = "sb_publishable_4xGHRNKKKIKrA16wRw0JWg_IIw-YUSV";
const STORAGE_URL = `${SUPABASE_URL}/storage/v1/object/public/images`;

const LM_DEFS = [
  { key: "pt", label: "Patella top", color: "#E24B4A", short: "PT" },
  { key: "pb", label: "Patella bottom", color: "#378ADD", short: "PB" },
  { key: "tt", label: "Tibial tuberosity", color: "#EF9F27", short: "TT" },
];

function getCategory(is) {
  if (is === null) return null;
  if (is < 0.74) return { label: "Patella baja", bg: "#FCEBEB", text: "#A32D2D" };
  if (is < 0.8) return { label: "Borderline baja", bg: "#FAEEDA", text: "#854F0B" };
  if (is <= 1.2) return { label: "Normal", bg: "#E1F5EE", text: "#0F6E56" };
  if (is <= 1.3) return { label: "Borderline alta", bg: "#FAEEDA", text: "#854F0B" };
  return { label: "Patella alta", bg: "#FCEBEB", text: "#A32D2D" };
}

function calcIS(lm) {
  if (!lm.pt || !lm.pb || !lm.tt) return null;
  const pLen = Math.hypot(lm.pt.x - lm.pb.x, lm.pt.y - lm.pb.y);
  const tLen = Math.hypot(lm.pb.x - lm.tt.x, lm.pb.y - lm.tt.y);
  return pLen < 3 ? null : tLen / pLen;
}

function getPlacingMode(lm) {
  if (!lm.pt) return "pt";
  if (!lm.pb) return "pb";
  if (!lm.tt) return "tt";
  return "done";
}

// ── Supabase helpers ──
async function supabaseFetch(path, opts = {}) {
  const headers = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, ...opts.headers };
  try {
    const r = await fetch(`${SUPABASE_URL}${path}`, { ...opts, headers });
    return r.ok ? r : null;
  } catch { return null; }
}

async function loadProgress(name) {
  const r = await supabaseFetch(`/rest/v1/annotations?radiologist=eq.${encodeURIComponent(name)}&select=study_id,slice_index,landmarks,is_index,category`);
  if (!r) return {};
  const rows = await r.json();
  const out = {};
  rows.forEach(row => { out[row.study_id] = { slice: row.slice_index, landmarks: row.landmarks, is_index: row.is_index, category: row.category }; });
  return out;
}

async function saveToSupabase(entry) {
  await supabaseFetch("/rest/v1/annotations", {
    method: "POST",
    headers: { "Content-Type": "application/json", Prefer: "resolution=merge-duplicates" },
    body: JSON.stringify(entry),
  });
}

// ── Canvas drawing ──
function drawImage(ctx, img, w, h, wl, zoom, pan) {
  ctx.clearRect(0, 0, w, h);
  ctx.save();
  ctx.translate(pan.x, pan.y);
  ctx.scale(zoom, zoom);
  if (img) {
    const tmp = document.createElement("canvas");
    tmp.width = img.naturalWidth || img.width;
    tmp.height = img.naturalHeight || img.height;
    const tc = tmp.getContext("2d");
    tc.drawImage(img, 0, 0);
    const id = tc.getImageData(0, 0, tmp.width, tmp.height);
    const lo = wl.wc - wl.ww / 2, hi = wl.wc + wl.ww / 2;
    for (let i = 0; i < id.data.length; i += 4) {
      let v = ((id.data[i] - lo) / (hi - lo)) * 255;
      v = Math.max(0, Math.min(255, v));
      id.data[i] = id.data[i+1] = id.data[i+2] = v;
    }
    tc.putImageData(id, 0, 0);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(tmp, 0, 0, w / zoom, h / zoom);
  } else {
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, w / zoom, h / zoom);
    ctx.fillStyle = "#333";
    ctx.font = "14px 'JetBrains Mono'";
    ctx.textAlign = "center";
    ctx.fillText("No image", w / zoom / 2, h / zoom / 2);
  }
  ctx.restore();
}

function drawOverlay(ctx, lm, w, h, zoom, pan) {
  ctx.clearRect(0, 0, w, h);
  const pairs = [["pt","pb"],["pb","tt"]];
  pairs.forEach(([a,b]) => {
    if (lm[a] && lm[b]) {
      ctx.beginPath();
      ctx.moveTo(lm[a].x * zoom + pan.x, lm[a].y * zoom + pan.y);
      ctx.lineTo(lm[b].x * zoom + pan.x, lm[b].y * zoom + pan.y);
      ctx.strokeStyle = "rgba(255,255,255,0.4)";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5,5]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  });
  LM_DEFS.forEach(({key, color, short}) => {
    if (!lm[key]) return;
    const sx = lm[key].x * zoom + pan.x, sy = lm[key].y * zoom + pan.y;
    ctx.beginPath();
    ctx.arc(sx, sy, 6, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = "#fff";
    ctx.font = "bold 11px 'JetBrains Mono',monospace";
    ctx.fillText(short, sx+10, sy+4);
  });
}

// ── Login ──
function Login({ onStart }) {
  const [name, setName] = useState("");
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"80vh"}}>
      <div style={{textAlign:"center",maxWidth:400}}>
        <div style={{fontSize:13,color:"#1D9E75",fontWeight:500,letterSpacing:1,textTransform:"uppercase",marginBottom:8}} className="mono">Research tool</div>
        <h1 style={{fontSize:24,fontWeight:500,marginBottom:6}}>Knee MRI annotation</h1>
        <p style={{fontSize:14,color:"#888",marginBottom:32,lineHeight:1.6}}>
          Select the optimal sagittal slice and mark 3 anatomical landmarks to calculate the Insall-Salvati index.
        </p>
        <input value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&name.trim()&&onStart(name.trim())}
          placeholder="Your name"
          style={{width:260,padding:"10px 14px",border:"1px solid #ddd",borderRadius:8,fontSize:15,fontFamily:"'DM Sans',sans-serif",background:"#fff",marginBottom:12,outline:"none"}}
        />
        <div>
          <button onClick={()=>name.trim()&&onStart(name.trim())}
            style={{padding:"10px 36px",background:"#1D9E75",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:500,cursor:"pointer"}}>
            Start annotation
          </button>
        </div>
        <div style={{marginTop:32,fontSize:12,color:"#aaa",lineHeight:1.8}}>
          <kbd>scroll</kbd> slices &nbsp; <kbd>click</kbd> place point &nbsp; <kbd>Z</kbd> undo &nbsp; <kbd>Enter</kbd> save<br/>
          <kbd>MMB+drag</kbd> window/level &nbsp; <kbd>Ctrl+scroll</kbd> zoom &nbsp; <kbd>RMB+drag</kbd> pan
        </div>
      </div>
    </div>
  );
}

// ── Main App ──
function App() {
  const [screen, setScreen] = useState("login");
  const [name, setName] = useState("");
  const [manifest, setManifest] = useState(null);
  const [studyIdx, setStudyIdx] = useState(0);
  const [sliceIdx, setSliceIdx] = useState(0);
  const [lm, setLm] = useState({pt:null,pb:null,tt:null});
  const [saved, setSaved] = useState({});
  const [zoom, setZoom] = useState(1);
  const [pan, setPan] = useState({x:0,y:0});
  const [wl, setWl] = useState({ww:300,wc:150});
  const [saving, setSaving] = useState(false);
  const [imgLoaded, setImgLoaded] = useState(false);

  const canvasRef = useRef(null);
  const overlayRef = useRef(null);
  const imgRef = useRef(null);
  const dragRef = useRef({type:null});
  const SIZE = 450;

  const study = manifest?.studies?.[studyIdx];
  const totalSlices = study?.slices || 1;
  const is = calcIS(lm);
  const cat = getCategory(is);
  const mode = getPlacingMode(lm);
  const completed = Object.keys(saved).length;

  // Load manifest
  useEffect(() => {
    fetch(`${STORAGE_URL}/manifest.json`).then(r=>r.json()).then(d=>{
      if(d?.studies?.length) setManifest(d);
    }).catch(()=>{});
  }, []);

  // Load image
  useEffect(() => {
    if (!study) return;
    setImgLoaded(false);
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = `${STORAGE_URL}/${study.id}/slice_${String(sliceIdx+1).padStart(3,"0")}.png`;
    img.onload = () => { imgRef.current = img; setImgLoaded(true); };
    img.onerror = () => { imgRef.current = null; setImgLoaded(true); };
  }, [study?.id, sliceIdx]);

  // Redraw
  useEffect(() => {
    if (!canvasRef.current || !overlayRef.current) return;
    drawImage(canvasRef.current.getContext("2d"), imgRef.current, SIZE, SIZE, wl, zoom, pan);
    drawOverlay(overlayRef.current.getContext("2d"), lm, SIZE, SIZE, zoom, pan);
  }, [imgLoaded, lm, wl, zoom, pan]);

  const goStudy = useCallback((idx) => {
    if (!manifest) return;
    const s = manifest.studies[idx];
    setStudyIdx(idx);
    const prev = saved[s?.id];
    if (prev) {
      setSliceIdx(prev.slice);
      setLm(JSON.parse(JSON.stringify(prev.landmarks)));
    } else {
      setSliceIdx(Math.floor((s?.slices||30)/2));
      setLm({pt:null,pb:null,tt:null});
    }
    setZoom(1); setPan({x:0,y:0}); setWl({ww:300,wc:150});
  }, [manifest, saved]);

  const changeSlice = useCallback((idx) => {
    const c = Math.max(0, Math.min(totalSlices-1, idx));
    if (c !== sliceIdx) { setSliceIdx(c); setLm({pt:null,pb:null,tt:null}); }
  }, [sliceIdx, totalSlices]);

  const undo = useCallback(() => {
    if (lm.tt) setLm(l=>({...l,tt:null}));
    else if (lm.pb) setLm(l=>({...l,pb:null}));
    else if (lm.pt) setLm(l=>({...l,pt:null}));
  }, [lm]);

  const doSave = useCallback(async () => {
    if (!study) return;
    if (mode !== "done") {
      if (studyIdx < manifest.studies.length-1) goStudy(studyIdx+1);
      return;
    }
    const entry = { radiologist: name, study_id: study.id, slice_index: sliceIdx, landmarks: lm, is_index: is !== null ? Math.round(is*1000)/1000 : null, category: cat?.label || null };
    setSaved(p => ({...p, [study.id]: {slice:sliceIdx, landmarks:JSON.parse(JSON.stringify(lm)), is_index:entry.is_index, category:entry.category}}));
    setSaving(true);
    await saveToSupabase(entry);
    setSaving(false);
    if (studyIdx < manifest.studies.length-1) goStudy(studyIdx+1);
  }, [study, mode, name, sliceIdx, lm, is, cat, studyIdx, manifest, goStudy]);

  // Mouse on canvas
  const handleMouseDown = useCallback((e) => {
    e.preventDefault();
    const rect = overlayRef.current.getBoundingClientRect();
    const scale = SIZE / rect.width;
    if (e.button === 1) {
      dragRef.current = {type:"wl",sx:e.clientX,sy:e.clientY,swl:{...wl}};
    } else if (e.button === 2 || (e.button===0 && e.ctrlKey)) {
      dragRef.current = {type:"pan",sx:e.clientX,sy:e.clientY,sp:{...pan},scale};
    } else if (e.button === 0 && mode !== "done") {
      const x = (e.clientX - rect.left) * scale;
      const y = (e.clientY - rect.top) * scale;
      const imgX = (x - pan.x) / zoom;
      const imgY = (y - pan.y) / zoom;
      setLm(l => ({...l, [mode]: {x:imgX, y:imgY}}));
    }
  }, [mode, wl, pan, zoom]);

  const handleMouseMove = useCallback((e) => {
    const d = dragRef.current;
    if (!d.type) return;
    if (d.type === "wl") {
      setWl({ww: Math.max(10, d.swl.ww + (e.clientX-d.sx)*2), wc: Math.max(0, d.swl.wc - (e.clientY-d.sy))});
    } else if (d.type === "pan") {
      setPan({x: d.sp.x + (e.clientX-d.sx)*d.scale, y: d.sp.y + (e.clientY-d.sy)*d.scale});
    }
  }, []);

  const handleMouseUp = useCallback(() => { dragRef.current = {type:null}; }, []);

  // Keys + wheel
  useEffect(() => {
    if (screen !== "app") return;
    const onKey = (e) => {
      if (e.key==="a"||e.key==="A"||e.key==="ArrowLeft") { e.preventDefault(); changeSlice(sliceIdx-1); }
      if (e.key==="d"||e.key==="D"||e.key==="ArrowRight") { e.preventDefault(); changeSlice(sliceIdx+1); }
      if (e.key==="z"||e.key==="Z") undo();
      if (e.key==="Enter") doSave();
    };
    const onWheel = (e) => {
      if (e.ctrlKey||e.metaKey) {
        e.preventDefault();
        setZoom(z => Math.max(0.5, Math.min(5, z + (e.deltaY<0?0.15:-0.15))));
      } else {
        e.preventDefault();
        changeSlice(sliceIdx + (e.deltaY>0?1:-1));
      }
    };
    window.addEventListener("keydown", onKey);
    window.addEventListener("wheel", onWheel, {passive:false});
    return () => { window.removeEventListener("keydown",onKey); window.removeEventListener("wheel",onWheel); };
  }, [screen, sliceIdx, changeSlice, undo, doSave]);

  // Start
  const handleStart = async (n) => {
    setName(n);
    const progress = await loadProgress(n);
    setSaved(progress);
    setScreen("app");
    if (manifest) {
      const s = manifest.studies[0];
      const prev = progress[s?.id];
      if (prev) { setSliceIdx(prev.slice); setLm(JSON.parse(JSON.stringify(prev.landmarks))); }
      else setSliceIdx(Math.floor((s?.slices||30)/2));
    }
  };

  if (!manifest) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"80vh"}}>
      <div style={{textAlign:"center"}}>
        <div className="mono" style={{fontSize:14,color:"#888"}}>Loading manifest...</div>
      </div>
    </div>
  );

  if (screen === "login") return <Login onStart={handleStart}/>;

  const modeColors = {pt:"#E24B4A",pb:"#378ADD",tt:"#EF9F27",done:"#1D9E75"};
  const modeLabels = {pt:"Place: patella top",pb:"Place: patella bottom",tt:"Place: tibial tuberosity",done:"All points placed"};
  const allPlaced = mode === "done";

  return (
    <div style={{maxWidth:940,margin:"0 auto",padding:"16px 20px"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span className="mono" style={{fontSize:13,background:"#fff",border:"1px solid #e0e0e0",borderRadius:8,padding:"4px 10px"}}>
            {studyIdx+1}/{manifest.studies.length}
          </span>
          <span className="mono" style={{fontSize:11,color:"#999",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{study.id}</span>
          <span style={{fontSize:13,color:"#888"}}>{completed} completed</span>
          {saving && <span style={{fontSize:12,color:"#1D9E75"}}>saving...</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:120,height:4,background:"#e8e8e8",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",background:"#1D9E75",borderRadius:2,width:`${(completed/manifest.studies.length)*100}%`,transition:"width 0.3s"}}/>
          </div>
          <span className="mono" style={{fontSize:12,color:"#aaa"}}>{name}</span>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) 230px",gap:16}}>
        {/* Viewer */}
        <div>
          <div style={{position:"relative",background:"#0a0a0a",borderRadius:12,overflow:"hidden",aspectRatio:"1"}}
            onContextMenu={e=>e.preventDefault()}>
            <canvas ref={canvasRef} width={SIZE} height={SIZE} style={{width:"100%",height:"100%",display:"block"}}/>
            <canvas ref={overlayRef} width={SIZE} height={SIZE}
              style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",cursor:mode==="done"?"default":"crosshair"}}
              onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}
            />
            <div className="mono" style={{position:"absolute",top:8,left:8,fontSize:11,color:"rgba(255,255,255,0.6)",background:"rgba(0,0,0,0.5)",padding:"2px 6px",borderRadius:4}}>
              Slice {sliceIdx+1}/{totalSlices}
            </div>
            <div className="mono" style={{position:"absolute",top:8,right:8,fontSize:11,padding:"3px 8px",borderRadius:4,background:modeColors[mode]+"dd",color:"#fff"}}>
              {modeLabels[mode]}
            </div>
            <div className="mono" style={{position:"absolute",bottom:8,right:8,fontSize:10,color:"rgba(255,255,255,0.5)"}}>
              W:{Math.round(wl.ww)} L:{Math.round(wl.wc)}{zoom!==1&&` ×${zoom.toFixed(1)}`}
            </div>
          </div>
          {/* Slice slider */}
          <div style={{display:"flex",alignItems:"center",gap:8,margin:"8px 0"}}>
            <span className="mono" style={{fontSize:12,color:"#999",minWidth:22}}>{sliceIdx+1}</span>
            <input type="range" min={0} max={totalSlices-1} value={sliceIdx} step={1}
              onChange={e=>{const v=parseInt(e.target.value);setSliceIdx(v);setLm({pt:null,pb:null,tt:null});}}
              style={{flex:1}}/>
            <span className="mono" style={{fontSize:12,color:"#999",minWidth:22}}>{totalSlices}</span>
          </div>
        </div>

        {/* Sidebar */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Landmarks */}
          <div style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:12,padding:"12px 14px"}}>
            <div style={{fontSize:11,color:"#aaa",textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Landmarks</div>
            {LM_DEFS.map((def,i) => (
              <div key={def.key} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<2?"1px solid #f0f0f0":"none"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:def.color,flexShrink:0}}/>
                <span style={{fontSize:13,flex:1}}>{def.label}</span>
                <span className="mono" style={{fontSize:11,color:"#aaa"}}>
                  {lm[def.key]?`${Math.round(lm[def.key].x)},${Math.round(lm[def.key].y)}`:"—"}
                </span>
                {lm[def.key] && <button onClick={()=>setLm(l=>({...l,[def.key]:null}))}
                  style={{fontSize:11,color:"#ccc",cursor:"pointer",border:"none",background:"none",padding:"2px 4px"}}>✕</button>}
              </div>
            ))}
          </div>

          {/* IS Index */}
          <div style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:12,padding:"12px 14px",textAlign:"center"}}>
            <div style={{fontSize:11,color:"#aaa",textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Insall-Salvati index</div>
            <div className="mono" style={{fontSize:28,fontWeight:500}}>{is!==null?is.toFixed(2):"—"}</div>
            {cat && <div style={{fontSize:13,marginTop:4,padding:"3px 10px",borderRadius:8,display:"inline-block",background:cat.bg,color:cat.text}}>{cat.label}</div>}
          </div>

          {/* Buttons */}
          <div style={{display:"flex",gap:8,marginTop:"auto"}}>
            <button onClick={()=>studyIdx>0&&goStudy(studyIdx-1)} disabled={studyIdx===0}
              style={{flex:1,padding:8,borderRadius:8,fontSize:13,fontWeight:500,cursor:studyIdx>0?"pointer":"default",
                border:"1px solid #ddd",background:"#fff",color:"#333",opacity:studyIdx>0?1:0.4}}>
              Prev
            </button>
            <button onClick={doSave}
              style={{flex:2,padding:8,borderRadius:8,fontSize:13,fontWeight:500,cursor:"pointer",border:"none",
                background:allPlaced?"#1D9E75":"#f0f0f0",color:allPlaced?"#fff":"#999"}}>
              {allPlaced?"Save + Next ↵":"Skip →"}
            </button>
          </div>

          {/* Hotkeys */}
          <div style={{fontSize:11,color:"#bbb",textAlign:"center",lineHeight:1.8}}>
            <kbd>scroll</kbd> slices <kbd>Z</kbd> undo <kbd>Enter</kbd> save<br/>
            <kbd>MMB</kbd> W/L <kbd>Ctrl+scroll</kbd> zoom <kbd>RMB</kbd> pan
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
